<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Projects</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css?family=Montserrat:700,400&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    /* ── NAVBAR FIX ── */
    header{position:fixed!important;top:0!important;left:0!important;width:100%!important;background:#23223a!important;z-index:9999!important;box-shadow:0 2px 16px rgba(0,0,0,0.3)!important;}
    main{padding-top:88px!important;}
    .logo{visibility:hidden;}
    .logo.ready{visibility:visible;}

    .content-section{padding:64px 24px 80px;}
    .content-section h2{font-family:'Montserrat',sans-serif;font-size:2.2rem;font-weight:700;color:#a259ff;margin:0 0 10px 0;}
    .proj-tagline{font-size:0.9rem;color:rgba(220,215,245,0.7);margin:0 0 36px 0;}
    .projects-grid{max-width:780px;display:flex;flex-direction:column;gap:18px;}
    .proj-card{background:#1e1d36;border-radius:14px;padding:24px 28px;border-left:4px solid #a259ff;opacity:0;transform:translateY(16px);animation:projFadeUp 0.45s ease forwards;display:flex;flex-direction:column;gap:10px;}
    .proj-card:nth-child(1){animation-delay:0.05s}.proj-card:nth-child(2){animation-delay:0.15s}.proj-card:nth-child(3){animation-delay:0.25s}.proj-card:nth-child(4){animation-delay:0.35s}.proj-card:nth-child(5){animation-delay:0.45s}
    @keyframes projFadeUp{to{opacity:1;transform:translateY(0);}}
    .proj-title{font-size:1.1rem;font-weight:700;color:#fff;}
    .proj-tech{display:inline-block;background:rgba(162,89,255,0.18);color:#a259ff;padding:4px 12px;border-radius:20px;font-size:0.8rem;font-weight:600;}
    .proj-desc{font-size:0.9rem;color:rgba(220,215,245,0.75);line-height:1.6;flex:1;}
    .proj-link a{display:inline-flex;align-items:center;gap:6px;color:#2979ff;font-size:0.88rem;font-weight:600;text-decoration:none;}
    .proj-link a:hover{text-decoration:underline;}
    .proj-empty{text-align:center;padding:56px 24px;opacity:0.55;font-size:14px;color:#ccc;line-height:1.8;}
    .proj-empty i{font-size:34px;display:block;margin-bottom:14px;color:#a259ff;opacity:0.7;}
  </style>
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="logo" id="siteLogo">.</div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="education.html">Education</a></li>
        <li><a href="experience.html">Experience</a></li>
        <li><a href="projects.html" class="active">Projects</a></li>
        <li><a href="certificates.html">Certificates</a></li>
        <li><a href="resume.html">Resume</a></li>
        <li><a href="contact.html" class="contact-btn">Contact</a></li>
        <li><a href="login.html" class="admin-btn">Admin</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <section class="content-section">
      <h2>Projects</h2>
      <p class="proj-tagline">Things I've built and worked on.</p>
      <div class="projects-grid" id="projectsList"></div>
    </section>
  </main>
  <script>
    const API = "http://localhost:8080";
    async function init(){
      try{
        const pr = await fetch(`${API}/api/profile`);
        const profile = await pr.json();
        const name = (profile && profile.name) ? profile.name.toUpperCase() : 'AKKIM MADHAN';
        document.getElementById('siteLogo').textContent = name;
        document.title = 'Projects - ' + (profile.name || 'Portfolio');
      }catch(e){ document.getElementById('siteLogo').textContent = 'AKKIM MADHAN'; }
      document.getElementById('siteLogo').classList.add('ready');

      const container = document.getElementById("projectsList");
      try{
        const res = await fetch(`${API}/api/projects`);
        const projects = await res.json();
        if(!projects || projects.length === 0){
          container.innerHTML = `<div class="proj-empty"><i class="fa-solid fa-rocket"></i>No projects found.<br>Add entries from the admin panel.</div>`;
          return;
        }
        container.innerHTML = projects.map(p=>`
          <div class="proj-card">
            <div class="proj-title">${p.title}</div>
            <div><span class="proj-tech">${p.tech}</span></div>
            <div class="proj-desc">${p.desc}</div>
            ${p.link&&p.link!=='#'?`<div class="proj-link"><a href="${p.link}" target="_blank"><i class="fas fa-external-link-alt"></i> View Project</a></div>`:''}
          </div>`).join("");
      }catch(err){
        container.innerHTML = `<div class="proj-empty"><i class="fa-solid fa-triangle-exclamation"></i>Server not reachable.<br>Make sure the backend is running.</div>`;
      }
    }
    init();
  </script>
</body>
</html>
