<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - GUDI BHANU TEJA</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css?family=Montserrat:700,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>

*{box-sizing:border-box}

.contact-wrapper{
min-height:80vh;
display:flex;
align-items:center;
justify-content:center;
padding:60px 20px;
}

.contact-card{
background:#23223a;
border:1px solid rgba(162,89,255,0.2);
border-radius:20px;
padding:48px 44px;
width:100%;
max-width:480px;
box-shadow:0 16px 60px rgba(162,89,255,0.15);
animation:fadeUp .6s ease forwards;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(30px)}
to{opacity:1;transform:translateY(0)}
}

.contact-card h2{
font-size:2rem;
color:#a259ff;
margin-bottom:8px;
}

.contact-card p{
color:#888;
font-size:.9rem;
margin-bottom:32px;
}

.form-group{
margin-bottom:20px;
}

label{
display:block;
margin-bottom:8px;
color:#ccc;
font-size:.8rem;
font-weight:600;
letter-spacing:.08em;
text-transform:uppercase;
}

input,textarea{
width:100%;
padding:12px 16px;
background:#18172e;
border:1.5px solid rgba(162,89,255,.2);
border-radius:10px;
color:#fff;
font-family:'Montserrat',sans-serif;
outline:none;
}

textarea{
min-height:120px;
}

.btn-send{
width:100%;
padding:14px;
background:linear-gradient(90deg,#a259ff,#2979ff);
color:#fff;
border:none;
border-radius:10px;
font-size:1rem;
font-weight:700;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
}

.btn-send:disabled{
opacity:.6;
cursor:not-allowed;
}

.spinner{
width:18px;
height:18px;
border:2px solid rgba(255,255,255,.3);
border-top-color:#fff;
border-radius:50%;
animation:spin .7s linear infinite;
display:none;
}

@keyframes spin{
to{transform:rotate(360deg)}
}

.success-box{
display:none;
background:rgba(76,175,80,.12);
border:1px solid rgba(76,175,80,.3);
border-radius:10px;
padding:16px;
text-align:center;
color:#4caf50;
margin-top:16px;
}

.error-box{
display:none;
background:rgba(255,80,80,.12);
border:1px solid rgba(255,80,80,.3);
border-radius:10px;
padding:16px;
text-align:center;
color:#ff6b6b;
margin-top:16px;
}

</style>
</head>

<body>

<header>
<nav class="navbar">
<div class="logo">GUDI BHANU TEJA</div>

<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="education.html">Education</a></li>
<li><a href="experience.html">Experience</a></li>
<li><a href="projects.html">Projects</a></li>
<li><a href="certificates.html">Certificates</a></li>
<li><a href="resume.html">Resume</a></li>
<li><a href="contact.html" class="contact-btn">Contact</a></li>
<li><a href="login.html" class="admin-btn">Admin</a></li>
</ul>
</nav>
</header>

<main>

<div class="contact-wrapper">

<div class="contact-card">

<h2>📬 Contact Me</h2>
<p>Fill the form below and I'll get back to you soon!</p>

<div class="form-group">
<label>Your Name</label>
<input type="text" id="senderName">
</div>

<div class="form-group">
<label>Your Email</label>
<input type="email" id="senderEmail">
</div>

<div class="form-group">
<label>Subject</label>
<input type="text" id="senderSubject">
</div>

<div class="form-group">
<label>Message</label>
<textarea id="senderMessage"></textarea>
</div>

<button class="btn-send" id="sendBtn" onclick="sendMessage()">
<span class="spinner" id="spinner"></span>
<i class="fas fa-paper-plane" id="sendIcon"></i>
<span id="sendText">Send Message</span>
</button>

<div class="success-box" id="successBox">
✅ Message sent successfully
</div>

<div class="error-box" id="errorBox">
❌ Failed to send message
</div>

</div>

</div>

</main>

<script>

const API_BASE="http://localhost:8080";

async function sendMessage(){

const name=document.getElementById("senderName").value.trim();
const email=document.getElementById("senderEmail").value.trim();
const subject=document.getElementById("senderSubject").value.trim();
const message=document.getElementById("senderMessage").value.trim();

if(!name||!email||!message){
alert("Please fill Name Email Message");
return;
}

const btn=document.getElementById("sendBtn");
const spinner=document.getElementById("spinner");
const icon=document.getElementById("sendIcon");
const text=document.getElementById("sendText");

btn.disabled=true;
spinner.style.display="block";
icon.style.display="none";
text.textContent="Sending...";

document.getElementById("successBox").style.display="none";
document.getElementById("errorBox").style.display="none";

try{

const response=await fetch(`${API_BASE}/api/messages`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
name,
email,
subject,
message
})
});

if(response.ok){

document.getElementById("successBox").style.display="block";

document.getElementById("senderName").value="";
document.getElementById("senderEmail").value="";
document.getElementById("senderSubject").value="";
document.getElementById("senderMessage").value="";

}else{

document.getElementById("errorBox").style.display="block";

}

}catch(err){

document.getElementById("errorBox").textContent="Server not running";
document.getElementById("errorBox").style.display="block";

}

btn.disabled=false;
spinner.style.display="none";
icon.style.display="inline";
text.textContent="Send Message";

}

</script>

</body>
</html>
