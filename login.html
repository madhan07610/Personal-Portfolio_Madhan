<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login - GUDI BHANU TEJA</title>

<link href="https://fonts.googleapis.com/css?family=Montserrat:700,400&display=swap" rel="stylesheet">

<!-- Font Awesome for Eye Icon -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

*{box-sizing:border-box;margin:0;padding:0;}

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:'Montserrat',Arial,sans-serif;
background:#23223a;
color:#fff;
overflow:hidden;
}

/* Password eye positioning */

.password-wrap{
position:relative;
}

.password-wrap input{
padding-right:44px;
}

.eye-btn{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
background:none;
border:none;
cursor:pointer;
font-size:1.1rem;
color:#666;
padding:4px;
transition:color .2s;
}

.eye-btn:hover{
color:#a259ff;
}

.login-container{
background:#1e1d36;
padding:48px 44px;
border-radius:20px;
width:380px;
box-shadow:0 16px 60px rgba(162,89,255,0.22);
border:1px solid rgba(162,89,255,0.18);
animation:slideUp .6s ease forwards;
}

@keyframes slideUp{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;transform:translateY(0);}
}

.login-header{text-align:center;margin-bottom:36px;}

.lock-icon{
font-size:2.6rem;
margin-bottom:10px;
display:block;
}

h2{
font-size:1.6rem;
font-weight:700;
}

.login-header p{
color:#888;
font-size:.9rem;
margin-top:6px;
}

.form-group{margin-bottom:20px;}

label{
display:block;
margin-bottom:8px;
color:#ccc;
font-weight:600;
font-size:.82rem;
text-transform:uppercase;
}

input{
width:100%;
padding:12px 16px;
background:#23223a;
border:1.5px solid rgba(162,89,255,.25);
border-radius:10px;
font-size:14px;
color:#fff;
outline:none;
}

input:focus{
border-color:#a259ff;
box-shadow:0 0 0 3px rgba(162,89,255,.15);
}

.btn-login{
width:100%;
padding:13px;
background:linear-gradient(90deg,#a259ff,#2979ff);
color:#fff;
border:none;
border-radius:10px;
cursor:pointer;
font-size:1rem;
font-weight:700;
margin-top:8px;
}

.btn-login:hover{opacity:.9;}

.error-msg{
display:none;
background:rgba(255,80,80,.12);
border:1px solid rgba(255,80,80,.3);
color:#ff6b6b;
padding:10px 16px;
border-radius:8px;
font-size:.88rem;
margin-top:14px;
text-align:center;
}

.back-link{text-align:center;margin-top:22px;}

.back-link a{
color:#a259ff;
text-decoration:none;
font-size:.9rem;
font-weight:600;
}

.status-badge{
display:flex;
align-items:center;
gap:6px;
justify-content:center;
font-size:.75rem;
margin-top:18px;
}

.status-dot{
width:8px;
height:8px;
border-radius:50%;
background:#555;
}

.status-dot.connected{background:#4caf50;}
.status-dot.disconnected{background:#ff6b6b;}

</style>
</head>

<body>

<div class="login-container">

<div class="login-header">
<span class="lock-icon">🔐</span>
<h2>Admin Login</h2>
<p>Access your portfolio dashboard</p>
</div>

<form id="loginForm">

<div class="form-group">
<label>Admin Email</label>
<input type="email" id="email" placeholder="admin@portfolio.com">
</div>

<div class="form-group">
<label>Password</label>

<div class="password-wrap">
<input type="password" id="password" placeholder="Enter password">

<button type="button" class="eye-btn" onclick="togglePassword()">
<i class="fa-solid fa-eye" id="eyeIcon"></i>
</button>
</div>

</div>

<button class="btn-login">LOGIN →</button>

<div class="error-msg" id="errorMsg"></div>

</form>

<div class="back-link">
<a href="index.html">← Back to Portfolio</a>
</div>

<div class="status-badge">
<div class="status-dot" id="statusDot"></div>
<span id="statusText">Checking server...</span>
</div>

</div>

<script>

const API_BASE="http://localhost:8080";

/* Check server */

async function checkServer(){

const dot=document.getElementById("statusDot");
const text=document.getElementById("statusText");

try{

const res=await fetch(API_BASE);

if(res.ok){
dot.className="status-dot connected";
text.textContent="Server connected";
}else{
throw new Error();
}

}catch{

dot.className="status-dot disconnected";
text.textContent="Server not reachable";

}

}

checkServer();

/* Password Toggle */

function togglePassword(){

const input=document.getElementById("password");
const icon=document.getElementById("eyeIcon");

if(input.type==="password"){
input.type="text";
icon.className="fa-solid fa-eye-slash";
}else{
input.type="password";
icon.className="fa-solid fa-eye";
}

}

/* If already logged in */

if(localStorage.getItem("isAdminLoggedIn")==="true"){
window.location.href="admin.html";
}

/* Login */

document.getElementById("loginForm").addEventListener("submit",function(e){

e.preventDefault();

const email=document.getElementById("email").value.trim();
const password=document.getElementById("password").value.trim();
const error=document.getElementById("errorMsg");

if(email==="admin@portfolio.com" && password==="admin123"){

localStorage.setItem("isAdminLoggedIn","true");
localStorage.setItem("adminEmail",email);

window.location.href="admin.html";

}else{

error.textContent="❌ Invalid admin credentials";
error.style.display="block";

}

});

</script>

</body>
</html>
